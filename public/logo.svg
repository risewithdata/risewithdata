<svg viewBox="0 0 585 106" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rise With Data">
  <title>Rise With Data — Small Cohorts. Big Impact.</title>

  <!-- Ground line under sun -->
  <line x1="6" y1="92" x2="126" y2="92" stroke="#C88010" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Sun outer semi-circle (golden orange) -->
  <path d="M36 92 A32 32 0 0 1 100 92" fill="#E8A020"/>

  <!-- Sun inner highlight (lighter yellow) -->
  <path d="M46 92 A22 22 0 0 1 90 92" fill="#F5C040"/>

  <!-- Rays emanating from sun center (68, 92) -->
  <!-- ±75° (near horizontal) -->
  <line x1="35"   y1="83.6" x2="20"   y2="79.6" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <line x1="101"  y1="83.6" x2="116"  y2="79.6" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <!-- ±60° -->
  <line x1="39.3" y1="74"   x2="25.4" y2="66"   stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <line x1="96.7" y1="74"   x2="110.6" y2="66"  stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <!-- ±40° -->
  <line x1="46.7" y1="65.7" x2="36.8" y2="53.7" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <line x1="89.3" y1="65.7" x2="99.2" y2="53.7" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <!-- ±20° -->
  <line x1="56.3" y1="59.5" x2="51"   y2="44.9" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <line x1="79.7" y1="59.5" x2="85"   y2="44.9" stroke="#C88010" stroke-width="2" stroke-linecap="round"/>
  <!-- 0° (straight up) -->
  <line x1="68"   y1="57"   x2="68"   y2="42"   stroke="#C88010" stroke-width="2" stroke-linecap="round"/>

  <!-- Thin vertical separator between icon and text -->
  <line x1="137" y1="12" x2="137" y2="92" stroke="#DDD0B0" stroke-width="0.9"/>

  <!-- "Rise With Data" — dark brown serif -->
  <text
    x="152" y="72"
    font-family="Georgia, 'Times New Roman', 'DejaVu Serif', serif"
    font-size="52"
    font-weight="400"
    fill="#1C0F08"
    letter-spacing="-0.5"
  >Rise With Data</text>

  <!-- Thin divider line under title -->
  <line x1="152" y1="81" x2="577" y2="81" stroke="#C88010" stroke-width="0.9"/>

  <!-- Subtitle — golden brown small caps -->
  <text
    x="156" y="97"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#C4882A"
    letter-spacing="3.5"
  >SMALL COHORTS. BIG IMPACT</text>
</svg>
